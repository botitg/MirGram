<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>MIRX - Мессенджер Мирнастана</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --primary: #3b82f6;
                --primary-dark: #1e40af;
                --primary-light: #93c5fd;
                --accent: #8b5cf6;
                --background: #0f172a;
                --surface: #1e293b;
                --surface-light: #334155;
                --border: rgba(148, 163, 184, 0.2);
                --text: #f1f5f9;
                --text-secondary: #cbd5e1;
                --text-muted: #94a3b8;
                --success: #10b981;
                --danger: #ef4444;
                --warning: #f59e0b;
                --glass-bg: rgba(30, 41, 59, 0.8);
                --glass-border: rgba(148, 163, 184, 0.3);
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
                color: var(--text);
            }

            body::before {
                content: '';
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background:
                    radial-gradient(at 20% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                    radial-gradient(at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
                pointer-events: none;
                z-index: -1;
            }

            .screen {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
            }

            .screen.hidden {
                display: none !important;
            }

            /* ===== AUTH SCREEN ===== */
            #authScreen {
                align-items: center;
                justify-content: center;
                padding: 20px;
            }

            .auth-container {
                width: 100%;
                max-width: 420px;
            }

            .auth-card {
                background: var(--glass-bg);
                backdrop-filter: blur(20px);
                border: 1px solid var(--glass-border);
                border-radius: 24px;
                padding: 40px 32px;
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
                animation: slideUp 0.5s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(40px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .auth-header {
                text-align: center;
                margin-bottom: 32px;
            }

            .auth-logo {
                width: 64px;
                height: 64px;
                margin: 0 auto 16px;
                background: linear-gradient(135deg, var(--primary), var(--accent));
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 32px;
                box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
            }

            .auth-header h1 {
                font-size: 28px;
                font-weight: 700;
                margin-bottom: 8px;
                background: linear-gradient(135deg, var(--primary), var(--accent));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            .auth-header p {
                font-size: 14px;
                color: var(--text-muted);
            }

            .auth-tabs {
                display: flex;
                gap: 12px;
                margin-bottom: 32px;
                background: rgba(0, 0, 0, 0.2);
                padding: 4px;
                border-radius: 12px;
            }

            .auth-tab {
                flex: 1;
                padding: 10px 16px;
                border: none;
                background: transparent;
                color: var(--text-muted);
                font-size: 14px;
                font-weight: 600;
                border-radius: 10px;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .auth-tab.active {
                background: var(--primary);
                color: white;
                box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            }

            .auth-form {
                display: flex;
                flex-direction: column;
                gap: 16px;
                animation: fadeIn 0.3s ease-out;
                display: none;
            }

            .auth-form.active {
                display: flex;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            .auth-form label {
                display: flex;
                flex-direction: column;
                gap: 8px;
                font-size: 14px;
                font-weight: 500;
                color: var(--text);
            }

            .auth-form input {
                padding: 12px 16px;
                border: 1px solid var(--border);
                background: rgba(0, 0, 0, 0.2);
                border-radius: 12px;
                color: var(--text);
                font-size: 14px;
                transition: all 0.3s ease;
            }

            .auth-form input:focus {
                outline: none;
                border-color: var(--primary);
                background: rgba(59, 130, 246, 0.05);
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            }

            .auth-form input::placeholder {
                color: var(--text-muted);
            }

            .auth-submit {
                padding: 12px 24px;
                background: linear-gradient(135deg, var(--primary), var(--accent));
                border: none;
                color: white;
                font-size: 15px;
                font-weight: 600;
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
                margin-top: 8px;
            }

            .auth-submit:hover:not(:disabled) {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
            }

            .auth-submit:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .auth-hint {
                text-align: center;
                font-size: 12px;
                color: var(--text-muted);
                margin-top: 16px;
                padding-top: 16px;
                border-top: 1px solid var(--border);
            }

            .auth-hint code {
                background: rgba(59, 130, 246, 0.1);
                padding: 2px 6px;
                border-radius: 4px;
                font-family: 'Monaco', 'Courier New', monospace;
                color: var(--primary-light);
            }

            /* ===== APP SCREEN ===== */
            #appScreen {
                background: var(--background);
            }

            .app-header {
                height: 60px;
                background: var(--glass-bg);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--glass-border);
                display: flex;
                align-items: center;
                padding: 0 20px;
                gap: 16px;
                flex-shrink: 0;
            }

            .header-brand {
                display: flex;
                align-items: center;
                gap: 12px;
                font-weight: 700;
                font-size: 20px;
                flex-shrink: 0;
            }

            .header-brand-icon {
                width: 36px;
                height: 36px;
                background: linear-gradient(135deg, var(--primary), var(--accent));
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
            }

            .app-layout {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            .sidebar {
                width: 320px;
                background: var(--surface);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .sidebar-header {
                padding: 16px 20px;
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-shrink: 0;
            }

            .sidebar-header h2 {
                font-size: 18px;
                font-weight: 700;
            }

            .sidebar-actions {
                display: flex;
                gap: 8px;
            }

            .sidebar-btn {
                width: 36px;
                height: 36px;
                background: transparent;
                border: 1px solid var(--border);
                color: var(--text);
                border-radius: 8px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                transition: all 0.2s ease;
            }

            .sidebar-btn:hover {
                background: rgba(59, 130, 246, 0.1);
                border-color: var(--primary);
                color: var(--primary);
            }

            .search-box {
                padding: 12px 16px;
                margin: 12px;
                background: rgba(0, 0, 0, 0.2);
                border: 1px solid var(--border);
                border-radius: 12px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .search-box input {
                flex: 1;
                background: transparent;
                border: none;
                color: var(--text);
                font-size: 14px;
                outline: none;
            }

            .search-box input::placeholder {
                color: var(--text-muted);
            }

            .chat-list {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
            }

            .chat-item {
                padding: 12px 16px;
                border-bottom: 1px solid var(--border);
                cursor: pointer;
                transition: all 0.2s ease;
                display: flex;
                gap: 12px;
                align-items: center;
            }

            .chat-item:hover {
                background: rgba(59, 130, 246, 0.05);
            }

            .chat-item.active {
                background: rgba(59, 130, 246, 0.1);
                border-left: 3px solid var(--primary);
                padding-left: 13px;
            }

            .chat-avatar {
                width: 48px;
                height: 48px;
                background: linear-gradient(135deg, var(--primary), var(--accent));
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
                flex-shrink: 0;
                overflow: hidden;
            }

            .chat-avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .chat-info {
                flex: 1;
                min-width: 0;
            }

            .chat-name {
                font-weight: 600;
                font-size: 14px;
                color: var(--text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .chat-preview {
                font-size: 13px;
                color: var(--text-muted);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-top: 4px;
            }

            /* ===== MAIN CONTENT ===== */
            .chat-panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .empty-state {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                gap: 16px;
            }

            .empty-state-icon {
                width: 80px;
                height: 80px;
                background: rgba(59, 130, 246, 0.1);
                border-radius: 20px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 48px;
            }

            .empty-state h3 {
                font-size: 20px;
                font-weight: 700;
            }

            .empty-state p {
                color: var(--text-muted);
                font-size: 14px;
                max-width: 300px;
            }

            .chat-view {
                display: flex;
                flex-direction: column;
                height: 100%;
                overflow: hidden;
                animation: fadeIn 0.3s ease-out;
            }

            .chat-header {
                height: 60px;
                background: var(--glass-bg);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--glass-border);
                padding: 0 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-shrink: 0;
            }

            .chat-header-info {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .chat-header-avatar {
                width: 40px;
                height: 40px;
                background: linear-gradient(135deg, var(--primary), var(--accent));
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                flex-shrink: 0;
                overflow: hidden;
            }

            .chat-header-avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .chat-header-text h3 {
                font-size: 15px;
                font-weight: 600;
                line-height: 1.2;
            }

            .chat-header-text p {
                font-size: 12px;
                color: var(--text-muted);
            }

            .chat-header-actions {
                display: flex;
                gap: 8px;
            }

            .messages {
                flex: 1;
                overflow-y: auto;
                padding: 16px 20px;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .message {
                display: flex;
                gap: 8px;
                animation: slideUp 0.3s ease-out;
            }

            .message.sent {
                justify-content: flex-end;
            }

            .message-avatar {
                width: 32px;
                height: 32px;
                background: linear-gradient(135deg, var(--primary), var(--accent));
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                flex-shrink: 0;
                overflow: hidden;
            }

            .message-avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .message-content {
                max-width: 60%;
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .message-sender {
                font-size: 12px;
                color: var(--text-muted);
                padding: 0 12px;
            }

            .message-bubble {
                padding: 10px 14px;
                border-radius: 12px;
                word-wrap: break-word;
                font-size: 14px;
                line-height: 1.4;
            }

            .message.received .message-bubble {
                background: var(--surface-light);
                color: var(--text);
                border: 1px solid var(--border);
            }

            .message.sent .message-bubble {
                background: linear-gradient(135deg, var(--primary), var(--accent));
                color: white;
            }

            .message-image {
                max-width: 300px;
                border-radius: 12px;
                overflow: hidden;
                margin: 4px 0;
            }

            .message-image img {
                width: 100%;
                height: auto;
                display: block;
            }

            /* ===== COMPOSER ===== */
            .composer {
                padding: 16px 20px;
                background: var(--surface);
                border-top: 1px solid var(--border);
                display: flex;
                gap: 12px;
                align-items: flex-end;
                flex-shrink: 0;
            }

            .composer-input {
                flex: 1;
                display: flex;
                gap: 8px;
                align-items: center;
            }

            .icon-btn {
                width: 36px;
                height: 36px;
                background: transparent;
                border: 1px solid var(--border);
                color: var(--text);
                border-radius: 8px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                transition: all 0.2s ease;
                flex-shrink: 0;
            }

            .icon-btn:hover {
                background: rgba(59, 130, 246, 0.1);
                border-color: var(--primary);
                color: var(--primary);
            }

            #messageInput {
                flex: 1;
                padding: 10px 14px;
                background: rgba(0, 0, 0, 0.2);
                border: 1px solid var(--border);
                color: var(--text);
                border-radius: 12px;
                font-size: 14px;
                resize: none;
                max-height: 100px;
                outline: none;
                transition: all 0.2s ease;
            }

            #messageInput:focus {
                border-color: var(--primary);
                background: rgba(59, 130, 246, 0.05);
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            }

            #messageInput::placeholder {
                color: var(--text-muted);
            }

            .send-btn {
                width: 36px;
                height: 36px;
                background: linear-gradient(135deg, var(--primary), var(--accent));
                border: none;
                color: white;
                border-radius: 8px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                transition: all 0.2s ease;
                flex-shrink: 0;
            }

            .send-btn:hover:not(:disabled) {
                transform: scale(1.05);
                box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            }

            .send-btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* ===== USER PROFILE ===== */
            .topbar {
                display: flex;
                align-items: center;
                gap: 16px;
                margin-left: auto;
            }

            .user-profile {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 8px 12px;
                border: 1px solid var(--border);
                border-radius: 10px;
                cursor: pointer;
                transition: all 0.2s ease;
            }

            .user-profile:hover {
                background: rgba(59, 130, 246, 0.05);
                border-color: var(--primary);
            }

            .user-avatar-small {
                width: 32px;
                height: 32px;
                background: linear-gradient(135deg, var(--primary), var(--accent));
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                overflow: hidden;
            }

            .user-avatar-small img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .logout-btn {
                padding: 8px 16px;
                background: transparent;
                border: 1px solid var(--danger);
                color: var(--danger);
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 600;
                transition: all 0.2s ease;
            }

            .logout-btn:hover {
                background: rgba(239, 68, 68, 0.1);
            }

            /* ===== TOAST ===== */
            .toasts {
                position: fixed;
                bottom: 20px;
                right: 20px;
                display: flex;
                flex-direction: column;
                gap: 12px;
                z-index: 1000;
                pointer-events: none;
            }

            .toast {
                background: var(--glass-bg);
                backdrop-filter: blur(20px);
                border: 1px solid var(--glass-border);
                color: var(--text);
                padding: 14px 18px;
                border-radius: 12px;
                font-size: 14px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                animation: slideInRight 0.3s ease-out;
                pointer-events: auto;
                cursor: pointer;
            }

            .toast.error {
                border-color: rgba(239, 68, 68, 0.5);
                background: rgba(239, 68, 68, 0.1);
                color: #fca5a5;
            }

            .toast.success {
                border-color: rgba(16, 185, 129, 0.5);
                background: rgba(16, 185, 129, 0.1);
                color: #86efac;
            }

            @keyframes slideInRight {
                from {
                    opacity: 0;
                    transform: translateX(100px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }

            /* ===== RESPONSIVENESS ===== */
            @media (max-width: 768px) {
                .sidebar {
                    position: absolute;
                    left: 0;
                    top: 60px;
                    width: 100%;
                    height: calc(100% - 60px);
                    z-index: 10;
                    transform: translateX(-100%);
                    transition: transform 0.3s ease;
                    border-right: none;
                    border-bottom: 1px solid var(--border);
                }

                .sidebar.open {
                    transform: translateX(0);
                }

                .chat-panel {
                    position: absolute;
                    left: 0;
                    right: 0;
                    top: 60px;
                    bottom: 0;
                }

                .mobile-menu-btn {
                    display: flex;
                }

                .message-content {
                    max-width: 85%;
                }

                .header-brand {
                    min-width: 0;
                }

                .topbar {
                    gap: 8px;
                }

                .app-header {
                    padding: 0 12px;
                }

                .send-btn {
                    width: 32px;
                    height: 32px;
                    font-size: 16px;
                }

                .icon-btn {
                    width: 32px;
                    height: 32px;
                    font-size: 16px;
                }

                #messageInput {
                    font-size: 13px;
                    padding: 9px 12px;
                }
            }

            @media (max-width: 480px) {
                .auth-card {
                    padding: 32px 24px;
                }

                .message-content {
                    max-width: 90%;
                }

                .messages {
                    padding: 12px 16px;
                    gap: 8px;
                }

                .composer {
                    padding: 12px 16px;
                    gap: 8px;
                }

                .header-brand-icon {
                    width: 32px;
                    height: 32px;
                    font-size: 18px;
                }

                .app-header {
                    height: 56px;
                    padding: 0 12px;
                }

                .header-brand {
                    font-size: 18px;
                    gap: 8px;
                }
            }

            /* ===== SCROLLBAR ===== */
            ::-webkit-scrollbar {
                width: 8px;
            }

            ::-webkit-scrollbar-track {
                background: transparent;
            }

            ::-webkit-scrollbar-thumb {
                background: rgba(148, 163, 184, 0.3);
                border-radius: 4px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: rgba(148, 163, 184, 0.5);
            }
        </style>
        <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    </head>
    <body>
        <div id="toasts" class="toasts"></div>

        <!-- AUTH SCREEN -->
        <section id="authScreen" class="screen">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-logo">🎮</div>
                        <h1>MIRX</h1>
                        <p>Мессенджер для Мирнастана</p>
                    </div>

                    <div class="auth-tabs">
                        <button class="auth-tab active" data-tab="login">Вход</button>
                        <button class="auth-tab" data-tab="register">Регистрация</button>
                    </div>

                    <form id="loginForm" class="auth-form active">
                        <label>
                            Ник
                            <input name="username" type="text" required minlength="3" maxlength="24" placeholder="nickname" />
                        </label>
                        <label>
                            Пароль
                            <input name="password" type="password" required minlength="6" placeholder="password" />
                        </label>
                        <button type="submit" class="auth-submit">Войти</button>
                        <p class="auth-hint">Демо: <code>president / mirna123</code>, <code>citizen / mirna123</code></p>
                    </form>

                    <form id="registerForm" class="auth-form">
                        <label>
                            Ник
                            <input name="username" type="text" required minlength="3" maxlength="24" placeholder="nickname" />
                        </label>
                        <label>
                            Пароль
                            <input name="password" type="password" required minlength="6" placeholder="password" />
                        </label>
                        <button type="submit" class="auth-submit">Создать аккаунт</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- APP SCREEN -->
        <section id="appScreen" class="screen hidden">
            <header class="app-header">
                <div class="header-brand">
                    <div class="header-brand-icon">🎮</div>
                    <span>MIRX</span>
                </div>
                <div class="topbar">
                    <div class="user-profile">
                        <div class="user-avatar-small" id="userAvatar">👤</div>
                        <span id="userName" style="font-size: 14px; font-weight: 600"></span>
                    </div>
                    <button id="logoutBtn" class="logout-btn">Выйти</button>
                </div>
            </header>

            <div class="app-layout">
                <!-- SIDEBAR -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h2>Чаты</h2>
                        <div class="sidebar-actions">
                            <button id="newPrivateBtn" class="sidebar-btn" title="Новое ЛС">💬</button>
                            <button id="newGroupBtn" class="sidebar-btn" title="Новая группа">👥</button>
                        </div>
                    </div>

                    <div class="search-box">
                        <span>🔍</span>
                        <input id="chatSearch" type="search" placeholder="Поиск..." />
                    </div>

                    <div id="chatList" class="chat-list"></div>
                </aside>

                <!-- CHAT PANEL -->
                <section class="chat-panel">
                    <div id="emptyState" class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <h3>Выберите чат</h3>
                        <p>Начните диалог, создайте группу или присоединитесь к беседе</p>
                    </div>

                    <div id="chatView" class="chat-view hidden">
                        <div id="chatHeader" class="chat-header">
                            <div class="chat-header-info">
                                <div class="chat-header-avatar" id="chatAvatar">💬</div>
                                <div class="chat-header-text">
                                    <h3 id="chatName">Чат</h3>
                                    <p id="chatMembers">Участники</p>
                                </div>
                            </div>
                            <div class="chat-header-actions"></div>
                        </div>

                        <div id="messages" class="messages"></div>

                        <form id="composer" class="composer">
                            <div class="composer-input">
                                <button id="emojiBtn" type="button" class="icon-btn" title="Emoji">😊</button>
                                <input id="messageInput" type="text" placeholder="Напишите сообщение..." maxlength="4000" />
                                <label class="icon-btn" style="cursor: pointer" title="Загрузить фото">
                                    📷
                                    <input id="imageInput" type="file" accept="image/*" hidden />
                                </label>
                            </div>
                            <button type="submit" class="send-btn">📤</button>
                        </form>
                    </div>
                </section>
            </div>
        </section>

        <script>
            const API_BASE_URL = window.location.origin;
            const TOKEN_KEY = 'mirno.token';

            let state = {
                me: null,
                token: localStorage.getItem(TOKEN_KEY) || '',
                chats: [],
                currentChatId: null,
                currentChat: null,
                messages: [],
                onlineUsers: new Set(),
                socket: null,
            };

            // ===== DOM ELEMENTS =====
            const dom = {
                authScreen: document.getElementById('authScreen'),
                appScreen: document.getElementById('appScreen'),
                loginForm: document.getElementById('loginForm'),
                registerForm: document.getElementById('registerForm'),
                authTabs: document.querySelectorAll('.auth-tab'),

                userName: document.getElementById('userName'),
                userAvatar: document.getElementById('userAvatar'),
                logoutBtn: document.getElementById('logoutBtn'),

                chatSearch: document.getElementById('chatSearch'),
                chatList: document.getElementById('chatList'),
                newPrivateBtn: document.getElementById('newPrivateBtn'),
                newGroupBtn: document.getElementById('newGroupBtn'),

                emptyState: document.getElementById('emptyState'),
                chatView: document.getElementById('chatView'),
                chatHeader: document.getElementById('chatHeader'),
                chatName: document.getElementById('chatName'),
                chatMembers: document.getElementById('chatMembers'),
                messages: document.getElementById('messages'),

                composer: document.getElementById('composer'),
                messageInput: document.getElementById('messageInput'),
                imageInput: document.getElementById('imageInput'),
                emojiBtn: document.getElementById('emojiBtn'),

                toasts: document.getElementById('toasts'),
            };

            // ===== UTILITIES =====
            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                dom.toasts.appendChild(toast);

                setTimeout(() => toast.remove(), 4000);
            }

            async function api(endpoint, options = {}) {
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers,
                };

                if (state.token) {
                    headers.Authorization = `Bearer ${state.token}`;
                }

                const response = await fetch(`${API_BASE_URL}/api${endpoint}`, {
                    ...options,
                    headers,
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({ error: 'Network error' }));
                    throw new Error(error.error || `HTTP ${response.status}`);
                }

                return response.json();
            }

            // ===== AUTH =====
            function setToken(token) {
                state.token = token;
                if (token) {
                    localStorage.setItem(TOKEN_KEY, token);
                } else {
                    localStorage.removeItem(TOKEN_KEY);
                }
            }

            function setAuthMode(isAuth) {
                dom.authScreen.classList.toggle('hidden', isAuth);
                dom.appScreen.classList.toggle('hidden', !isAuth);
            }

            async function login(e) {
                e.preventDefault();
                const form = e.target;
                const submitBtn = form.querySelector('button[type="submit"]');

                try {
                    submitBtn.disabled = true;
                    const data = await api('/auth/login', {
                        method: 'POST',
                        body: JSON.stringify({
                            username: form.username.value,
                            password: form.password.value,
                        }),
                    });

                    setToken(data.token);
                    state.me = data.user;
                    setAuthMode(true);
                    renderUserProfile();
                    await loadChats();
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    submitBtn.disabled = false;
                }
            }

            async function register(e) {
                e.preventDefault();
                const form = e.target;
                const submitBtn = form.querySelector('button[type="submit"]');

                try {
                    submitBtn.disabled = true;
                    const data = await api('/auth/register', {
                        method: 'POST',
                        body: JSON.stringify({
                            username: form.username.value,
                            password: form.password.value,
                        }),
                    });

                    setToken(data.token);
                    state.me = data.user;
                    setAuthMode(true);
                    renderUserProfile();
                    await loadChats();
                    showToast('Аккаунт создан! Добро пожаловать! 🎉', 'success');
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    submitBtn.disabled = false;
                }
            }

            function logout() {
                setToken('');
                state.me = null;
                state.chats = [];
                state.currentChatId = null;
                dom.chatList.innerHTML = '';
                dom.messages.innerHTML = '';
                setAuthMode(false);
            }

            // ===== RENDER =====
            function renderUserProfile() {
                if (!state.me) return;
                const initial = state.me.username[0].toUpperCase();
                dom.userAvatar.textContent = initial;
                dom.userName.textContent = state.me.username;
            }

            function renderChats() {
                dom.chatList.innerHTML = '';
                state.chats.forEach((chat) => {
                    const item = document.createElement('div');
                    item.className = `chat-item ${chat.id === state.currentChatId ? 'active' : ''}`;
                    item.dataset.chatId = chat.id;

                    const initial = chat.name[0].toUpperCase();
                    item.innerHTML = `
                    <div class="chat-avatar">${initial}</div>
                    <div class="chat-info">
                        <div class="chat-name">${chat.name}</div>
                        <div class="chat-preview">${chat.lastMessage?.text || 'Нет сообщений'}</div>
                    </div>
                `;

                    item.addEventListener('click', () => openChat(chat.id));
                    dom.chatList.appendChild(item);
                });
            }

            function renderMessages() {
                dom.messages.innerHTML = '';
                state.messages.forEach((msg) => {
                    const msgEl = document.createElement('div');
                    msgEl.className = `message ${msg.sender?.id === state.me?.id ? 'sent' : 'received'}`;

                    const initial = msg.sender?.username?.[0]?.toUpperCase() || 'S';
                    msgEl.innerHTML = `
                    <div class="message-avatar">${initial}</div>
                    <div class="message-content">
                        <div class="message-sender">${msg.sender?.username || 'System'}</div>
                        <div class="message-bubble">
                            ${msg.text || ''}
                        </div>
                    </div>
                `;

                    dom.messages.appendChild(msgEl);
                });

                dom.messages.scrollTop = dom.messages.scrollHeight;
            }

            // ===== ACTIONS =====
            async function loadChats() {
                try {
                    const data = await api('/chats');
                    state.chats = data.chats || [];
                    renderChats();
                } catch (error) {
                    showToast(error.message, 'error');
                }
            }

            async function openChat(chatId) {
                try {
                    const data = await api(`/chats/${chatId}`);
                    state.currentChatId = chatId;
                    state.currentChat = data.chat;

                    // Load messages
                    const messagesData = await api(`/chats/${chatId}/messages`);
                    state.messages = messagesData.messages || [];

                    dom.chatName.textContent = data.chat.name || 'Чат';
                    dom.chatMembers.textContent = `${data.members?.length || 0} участников`;

                    dom.emptyState.classList.add('hidden');
                    dom.chatView.classList.remove('hidden');
                    renderChats();
                    renderMessages();
                } catch (error) {
                    showToast(error.message, 'error');
                }
            }

            async function sendMessage(e) {
                e.preventDefault();
                if (!state.currentChatId || !dom.messageInput.value.trim()) return;

                const submitBtn = e.target.querySelector('button[type="submit"]');
                try {
                    submitBtn.disabled = true;
                    const data = await api(`/chats/${state.currentChatId}/messages`, {
                        method: 'POST',
                        body: JSON.stringify({
                            text: dom.messageInput.value,
                        }),
                    });

                    state.messages.push(data.message);
                    dom.messageInput.value = '';
                    renderMessages();
                    await loadChats();
                } catch (error) {
                    showToast(error.message, 'error');
                } finally {
                    submitBtn.disabled = false;
                }
            }

            // ===== UI SETUP =====
            function setupTabs() {
                dom.authTabs.forEach((tab) => {
                    tab.addEventListener('click', () => {
                        dom.authTabs.forEach((t) => t.classList.remove('active'));
                        tab.classList.add('active');

                        const tabName = tab.dataset.tab;
                        dom.loginForm.classList.toggle('active', tabName === 'login');
                        dom.registerForm.classList.toggle('active', tabName === 'register');
                    });
                });
            }

            function setupEventListeners() {
                dom.loginForm.addEventListener('submit', login);
                dom.registerForm.addEventListener('submit', register);
                dom.logoutBtn.addEventListener('click', logout);
                dom.composer.addEventListener('submit', sendMessage);
                dom.newPrivateBtn.addEventListener('click', () => showToast('Скоро доступно!', 'info'));
                dom.newGroupBtn.addEventListener('click', () => showToast('Скоро доступно!', 'info'));
            }

            function connectSocket() {
                if (!state.token) return;

                state.socket = io(window.location.origin, {
                    auth: {
                        token: state.token,
                    },
                });

                state.socket.on('connect', () => {
                    showToast('Подключено 🌐', 'success');
                });

                state.socket.on('disconnect', () => {
                    showToast('Отключено 📡', 'info');
                });

                state.socket.on('message:new', (message) => {
                    if (message.chatId === state.currentChatId) {
                        state.messages.push(message);
                        renderMessages();
                    }
                    loadChats();
                });

                state.socket.on('member:updated', () => {
                    if (state.currentChatId) {
                        openChat(state.currentChatId);
                    }
                });
            }

            // ===== INIT =====
            async function init() {
                setupTabs();
                setupEventListeners();

                if (state.token) {
                    try {
                        const data = await api('/auth/me');
                        state.me = data.user;
                        setAuthMode(true);
                        renderUserProfile();
                        await loadChats();
                        connectSocket();
                    } catch {
                        setToken('');
                        setAuthMode(false);
                    }
                } else {
                    setAuthMode(false);
                }
            }

            init();
        </script>
    </body>
</html>
